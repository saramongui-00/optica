version: '3.8'

services:
  eureka-server:
    build: .
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - optica-network
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - optica-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    networks:
      - optica-network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    networks:
      - optica-network
    environment:
      MYSQL_ROOT_PASSWORD: mnbv
      MYSQL_DATABASE: db_usuarios
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  mongodb-historial:
    image: mongo:7
    container_name: mongodb-historial
    ports:
      - "27018:27017"
    networks:
      - optica-network
    volumes:
      - mongo_data:/data/db

  ms-usuarios:
    build: ../servicios/servicio-usuarios
    container_name: ms-usuarios
    depends_on:
      - kafka
      - mysql
      - eureka-server
    ports:
      - "8082:8082"
    networks:
      - optica-network
    restart: on-failure 
    environment:
      PORT: 8082
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: mnbv
      DB_NAME: db_usuarios
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: una_clave_secreta_larga_y_dificil
      EUREKA_HOST: eureka-server

  ms-autenticacion:
    build: ../servicios/servicio-auth
    container_name: ms-autenticacion
    depends_on:
      - kafka
      - mysql
      - eureka-server
    ports:
      - "8081:8081"
    networks:
      - optica-network
    restart: on-failure 
    environment:
      PORT: 8081
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: mnbv
      DB_NAME: db_usuarios
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: una_clave_secreta_larga_y_dificil
      JWT_EXPIRES_IN: 8h
      EUREKA_HOST: eureka-server

  ms-historial:
    build: ../servicios/servicio-historial
    container_name: ms-historial
    depends_on:
      - kafka
      - mongodb-historial
      - eureka-server
    ports:
      - "8085:8085"
    networks:
      - optica-network
    environment:
      SPRING_PROFILES_ACTIVE: docker

volumes:
  mysql_data:
  mongo_data:

networks:
  optica-network:
    driver: bridge