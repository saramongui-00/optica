services:

  eureka-server:
    build: .
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - optica-network
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - optica-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    networks:
      - optica-network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  
  ms-historial:
    build: ../servicios/servicio-historial
    container_name: ms-historial
    depends_on:
      - kafka
      - mongodb-historial
      - eureka-server
    ports:
      - "8085:8085"
    networks:
      - optica-network
    environment:
      SPRING_PROFILES_ACTIVE: docker

  mongodb-historial:
    image: mongo:7
    container_name: mongodb-historial
    ports:
      - "27018:27017"
    networks:
      - optica-network
    volumes:
      - mongo_data:/data/db

