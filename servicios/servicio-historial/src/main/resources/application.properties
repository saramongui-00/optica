spring.application.name=servicio-historial

server.port=8085

# MongoDB
spring.mongodb.host=mongodb
spring.mongodb.port=27017
spring.mongodb.database=historialdb
spring.mongodb.username=admin
spring.mongodb.password=admin123
spring.mongodb.authentication-database=admin
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Kafka
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=historial-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.optica.historial.events.PatientCreatedEvent